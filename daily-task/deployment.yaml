apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: cka-lab
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - image: nginx:1.25
        imagePullPolicy: Always
        name: nginx

