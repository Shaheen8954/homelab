# easyshop-binding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: easyshop-dev-binding
  namespace: easyshop-hack
subjects:
- kind: ServiceAccount
  name: easyshop-dev-sa
  namespace: easyshop-hack
roleRef:
  kind: Role
  name: easyshop-dev-role
  apiGroup: rbac.authorization.k8s.io
